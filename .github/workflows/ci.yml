name: ✅ CI — Test on PR

on:
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn psycopg2-binary python-dotenv python-multipart pydantic
      - name: Verify backend imports
        run: |
          python -c "from api.main import app; print('✅ Backend imports OK')"

  test-frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
          echo "✅ TypeScript checks passed"
