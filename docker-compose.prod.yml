version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: prism_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./global-bundle.pem:/app/global-bundle.pem:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
        NEXT_PUBLIC_NEWS_API_URL: https://prism.thequantsoft.co.in/news-api
    container_name: prism_frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - backend

  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    container_name: prism_landing
    restart: unless-stopped
    env_file: .env.landing
    ports:
      - "3002:3002"

  nginx:
    image: nginx:alpine
    container_name: prism_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
      - landing
