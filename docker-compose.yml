version: '3.8'

services:
  # PostgreSQL 17 - Primary Database
  postgres:
    image: pgvector/pgvector:pg17
    container_name: prism_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: prism_analyst
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism -d prism_analyst"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin 4 - Free Visual Database Browser (for demo)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: prism_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin_servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
