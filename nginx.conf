upstream frontend {
    server frontend:3001;
}

upstream backend {
    server backend:8000;
}

upstream landing {
    server landing:3002;
}

# ─── Landing Page: HTTP → HTTPS redirect ───
server {
    listen 80;
    server_name thequantsoft.co.in www.thequantsoft.co.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://thequantsoft.co.in$request_uri;
    }
}

# ─── Landing Page: www → non-www redirect ───
server {
    listen 443 ssl;
    server_name www.thequantsoft.co.in;

    ssl_certificate     /etc/letsencrypt/live/thequantsoft.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thequantsoft.co.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://thequantsoft.co.in$request_uri;
}

# ─── Landing Page: HTTPS server ───
server {
    listen 443 ssl;
    server_name thequantsoft.co.in;

    ssl_certificate     /etc/letsencrypt/live/thequantsoft.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thequantsoft.co.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_LANDING:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://landing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── PRISM: HTTP → HTTPS redirect ───
server {
    listen 80;
    server_name prism.thequantsoft.co.in;

    # Let's Encrypt ACME challenge (must stay on HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── PRISM: HTTPS server ───
server {
    listen 443 ssl;
    server_name prism.thequantsoft.co.in;

    # SSL certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/prism.thequantsoft.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prism.thequantsoft.co.in/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 50M;

    # ─── Backend API ───
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support (critical for chat responses)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    # Health check
    location /health {
        proxy_pass http://backend;
    }

    # Presenton proxy — serves the editor iframe and all its assets
    location /presenton/ {
        proxy_pass http://34.47.250.116:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Disable compression so sub_filter can inspect response body
        proxy_set_header Accept-Encoding "";

        # Rewrite absolute asset paths in Presenton HTML/JS responses
        # Presenton (Next.js) emits /_next/... paths — remap to /presenton/_next/...
        # Also remap runtime API calls from /api/v1/ppt/ to /presenton/api/v1/ppt/
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/javascript;
        sub_filter '/_next/' '/presenton/_next/';
        sub_filter '"/api/v1/ppt/' '"/presenton/api/v1/ppt/';
    }

    # News API proxy — provides HTTPS access to the news aggregator
    location /news-api/ {
        proxy_pass http://34.47.250.116:8001/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Frontend (catch-all) ───
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
